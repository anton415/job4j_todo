<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Добавить задание</title>
    <link rel="icon" th:href="@{/favicon.svg}" type="image/svg+xml">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="page page-narrow">
    <header class="header">
        <div>
            <p class="eyebrow">Новое задание</p>
            <h1>Добавить задание</h1>
        </div>
        <div class="header-actions">
            <div class="userbar" th:if="${currentUser != null}">
                <span class="user-name" th:text="${currentUser.name}">Пользователь</span>
                <form th:action="@{/logout}" method="post">
                    <button class="button" type="submit">Выйти</button>
                </form>
            </div>
            <a class="button" th:href="@{/tasks}">К списку</a>
        </div>
    </header>

    <form class="form" th:action="@{/tasks}" method="post">
        <label for="title">Название</label>
        <input id="title" name="title" type="text" maxlength="255" required autofocus>

        <label for="description">Описание</label>
        <textarea id="description" name="description" rows="7" required></textarea>

        <label for="priority">Приоритет</label>
        <select id="priority" name="priority.id" required>
            <option th:each="priority : ${priorities}"
                    th:value="${priority.id}"
                    th:text="${priority.name}"
                    th:selected="${priority.name == 'normal'}">
                priority
            </option>
        </select>

        <label for="categoryIds">Категории</label>
        <select id="categoryIds" name="categoryIds" multiple size="4">
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}">
                category
            </option>
        </select>

        <div class="actions">
            <button class="button button-primary" type="submit">Сохранить</button>
            <a class="button" th:href="@{/tasks}">Отмена</a>
        </div>
    </form>
</main>
</body>
</html>
