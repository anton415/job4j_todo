<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Редактировать задание</title>
    <link rel="icon" th:href="@{/favicon.svg}" type="image/svg+xml">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="page page-narrow">
    <header class="header">
        <div>
            <p class="eyebrow">Редактирование</p>
            <h1>Редактировать задание</h1>
        </div>
        <a class="button" th:href="@{/tasks/{id}(id=${task.id})}">Назад</a>
    </header>

    <form class="form" th:action="@{/tasks/{id}/update(id=${task.id})}" method="post">
        <label for="title">Название</label>
        <input id="title" name="title" type="text" maxlength="255" required autofocus th:value="${task.title}">

        <label for="description">Описание</label>
        <textarea id="description" name="description" rows="7" required th:text="${task.description}"></textarea>

        <label class="checkbox">
            <input type="checkbox" name="done" value="true" th:checked="${task.done}">
            <span>Выполнено</span>
        </label>

        <div class="actions">
            <button class="button button-primary" type="submit">Сохранить</button>
            <a class="button" th:href="@{/tasks/{id}(id=${task.id})}">Отмена</a>
        </div>
    </form>
</main>
</body>
</html>
